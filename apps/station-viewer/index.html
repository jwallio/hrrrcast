<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HRRRCast 1D Viewer</title>
    <meta
      name="description"
      content="Airport-code HRRRCast time-series viewer with interactive severe-weather charts."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-shell">
        <div class="brand-block">
          <span class="brand-mark">HRRRCast 1D Viewer</span>
          <span class="brand-note">Airport lookup and interactive severe-weather charts</span>
        </div>
        <div class="status-pill" id="statusPill">Loading latest-ready run</div>
      </header>

      <main class="viewer-shell">
        <section class="query-shell">
          <form class="lookup-form" id="lookupForm" autocomplete="off">
            <label class="lookup-field">
              <span>Airport Code</span>
              <input id="stationInput" name="station" type="text" placeholder="KRDU, KATL, KDEN" spellcheck="false" />
            </label>
            <button type="submit" class="primary-button">Load Charts</button>
          </form>
          <div class="suggestions" id="suggestions" hidden></div>

          <div class="control-row">
            <label class="field">
              <span>Run</span>
              <select id="runSelect"></select>
            </label>
            <label class="field">
              <span>Mode</span>
              <select id="memberSelect"></select>
            </label>
          </div>
        </section>

        <section class="station-shell" id="stationShell">
          <div class="station-header">
            <div>
              <p class="station-kicker">Selected Point</p>
              <h1 class="station-title" id="stationTitle">Choose an airport</h1>
            </div>
            <div class="station-meta" id="stationMeta"></div>
          </div>
          <p class="station-copy" id="stationCopy">
            Search by ICAO, FAA, or IATA code to load nearest-grid HRRRCast time series.
          </p>
        </section>

        <section class="browser-shell">
          <div class="browser-head">
            <div>
              <p class="section-kicker">Element Browser</p>
              <h2 class="section-title">Chart Groups</h2>
            </div>
          </div>
          <div class="group-strip" id="groupFilters"></div>
        </section>

        <section class="chart-groups" id="chartGroups"></section>
      </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
