<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HRRRCast</title>
    <meta
      name="description"
      content="Static NOAA HRRRCast severe weather viewer with compact controls and fast frame stepping."
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="site-bar">
        <div class="brand-block">
          <span class="brand-mark">HRRRCast</span>
          <span class="brand-note">Severe weather snapshot viewer</span>
        </div>
        <div class="run-badge" id="runBadge">Loading latest run</div>
      </header>

      <main class="viewer-shell">
        <section class="product-shell" aria-label="Forecast product">
          <div class="product-head">
            <div class="title-block">
              <p class="product-kicker" id="overlayFamilyLabel">Featured</p>
              <h1 class="product-title" id="productTitle">Loading forecast</h1>
            </div>

            <div class="product-stamp">
              <span id="metaInit">Init</span>
              <span id="metaValid">Valid</span>
              <span id="metaMember">Ensemble</span>
            </div>
          </div>

          <div class="image-shell" id="imageShell">
            <canvas id="forecastCanvas" aria-label="Forecast image"></canvas>
            <div class="image-loading" id="imageLoading" hidden>Loading frame</div>
          </div>

          <div class="legend-rail">
            <div class="legend-topline">
              <span id="legendLabel">Legend</span>
              <span id="legendUnits"></span>
            </div>
            <div class="legend-scale" id="legendScale"></div>
          </div>
        </section>

        <section class="timeline-shell" aria-label="Forecast timeline">
          <div class="timeline-topline">
            <div class="transport">
              <button type="button" id="prevHourButton">Prev</button>
              <button type="button" id="playButton">Play</button>
              <button type="button" id="nextHourButton">Next</button>
            </div>

            <label class="speed-field">
              <span>Speed</span>
              <select id="speedSelect">
                <option value="1200">Slow</option>
                <option value="700" selected>Medium</option>
                <option value="350">Fast</option>
              </select>
            </label>

            <div class="timeline-summary">
              <span id="hourLabel">F000</span>
              <span id="validLabel">Valid</span>
            </div>
          </div>

          <input
            id="hourRange"
            class="hour-range"
            type="range"
            min="0"
            max="0"
            step="1"
            value="0"
          />

          <div class="hour-chips" id="hourChips" aria-label="Forecast hour quick picks"></div>
        </section>

        <section class="action-strip" aria-label="Share current forecast view">
          <button type="button" class="action-button action-button-primary" id="shareImageButton">Share Image</button>
          <button type="button" class="action-button" id="copyLinkButton">Copy Link</button>
          <button type="button" class="action-button" id="downloadImageButton">Save PNG</button>
          <span class="share-status" id="shareStatus" aria-live="polite"></span>
        </section>

        <section class="toolbar" aria-label="Viewer controls">
          <label class="field">
            <span>Run</span>
            <select id="runSelect"></select>
          </label>

          <label class="field">
            <span>Mode</span>
            <select id="memberSelect"></select>
          </label>

          <label class="field">
            <span>Region</span>
            <select id="domainSelect"></select>
          </label>

          <label class="field">
            <span>Family</span>
            <select id="familySelect"></select>
          </label>

          <label class="field field-wide">
            <span>Field</span>
            <select id="overlaySelect"></select>
          </label>
        </section>

        <section class="insight-shell" aria-label="Field context">
          <div class="preset-shell">
            <span class="insight-kicker">Quick Looks</span>
            <div class="preset-strip" id="presetStrip"></div>
          </div>

          <details class="insight-copy insight-details" open>
            <summary class="insight-summary">About This Field</summary>
            <p class="insight-text" id="fieldDescription">
              Loading severe-weather field description.
            </p>
            <p class="insight-hint" id="fieldHint"></p>
          </details>
        </section>

      </main>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
