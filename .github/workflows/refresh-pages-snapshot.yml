name: Refresh Pages Snapshot

on:
  schedule:
    - cron: "35 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: refresh-pages-snapshot
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Install official NOAA wgrib2 Windows binaries
        shell: powershell
        run: |
          $target = "C:\wgrib2"
          New-Item -ItemType Directory -Force -Path $target | Out-Null
          $base = "https://ftp.cpc.ncep.noaa.gov/wd51we/wgrib2/Windows10/v3.1.3"
          $files = @(
            "wgrib2.exe",
            "cyggcc_s-seh-1.dll",
            "cyggfortran-5.dll",
            "cyggomp-1.dll",
            "cygquadmath-0.dll",
            "cygwin1.dll"
          )
          foreach ($file in $files) {
            Invoke-WebRequest -Uri "$base/$file" -OutFile (Join-Path $target $file)
          }
          "WGRIB2_EXE=$target\wgrib2.exe" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Capture currently published run
        id: current
        shell: powershell
        run: |
          if (Test-Path "apps/web/static-api/latest-ready.json") {
            $runId = python -c "import json, pathlib; print(json.loads(pathlib.Path('apps/web/static-api/latest-ready.json').read_text(encoding='utf-8'))['run']['run_id'])"
            "run_id=$runId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "run_id=" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Build latest-ready CONUS ensemble snapshot inputs
        run: |
          python scripts/refresh_latest_ready_workflow.py --profile pages_snapshot --skip-health-check --recent-runs-to-scan 8

      - name: Capture newly discovered latest-ready run
        id: latest
        shell: powershell
        run: |
          $runId = python -c "import json, pathlib; manifests = pathlib.Path('data/processed/manifests'); ready = [json.loads(path.read_text(encoding='utf-8')) for path in manifests.glob('*.json') if path.name != 'latest.json' and json.loads(path.read_text(encoding='utf-8'))['run']['status'] == 'ready']; ready.sort(key=lambda item: item['run']['run_id']); print(ready[-1]['run']['run_id'])"
          "run_id=$runId" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Export static Pages snapshot
        if: steps.latest.outputs.run_id != steps.current.outputs.run_id
        run: |
          python scripts/export_static_pages_data.py --clean --member ens

      - name: Commit updated snapshot
        if: steps.latest.outputs.run_id != steps.current.outputs.run_id
        shell: powershell
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add apps/web/static-api
          git diff --cached --quiet
          if ($LASTEXITCODE -ne 0) {
            git commit -m "Refresh static Pages snapshot for ${{ steps.latest.outputs.run_id }}"
            git push origin HEAD:main
          }

      - name: Configure Pages
        if: ${{ steps.latest.outputs.run_id != steps.current.outputs.run_id }}
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: ${{ steps.latest.outputs.run_id != steps.current.outputs.run_id }}
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web

      - name: Deploy Pages
        if: ${{ steps.latest.outputs.run_id != steps.current.outputs.run_id }}
        uses: actions/deploy-pages@v4
